<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Suya's Happy English</title>
  <style>
    :root {
      --bg: #fffaf1;
      --panel: #ffffff;
      --ink: #2f3c52;
      --muted: #7f8797;
      --orange: #ffb11b;
      --orange-deep: #f39a00;
      --line: #f1dfc4;
      --shadow: 0 14px 30px rgba(77, 91, 124, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 219, 148, 0.45) 0, transparent 20%),
        linear-gradient(180deg, #fffdf8 0%, var(--bg) 100%);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .app {
      width: min(980px, calc(100vw - 20px));
      min-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      margin: 0 auto;
      padding: 12px 0 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .topbar,
    .card,
    .footer-panel {
      background: var(--panel);
      border: 2px solid #fff;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .progress-text {
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }

    .dots {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .dots::-webkit-scrollbar {
      display: none;
    }

    .dot {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: none;
      background: #f4f4f4;
      color: #8b8f99;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .dot.active {
      background: #fff8e3;
      color: var(--orange-deep);
      box-shadow: inset 0 0 0 2px #ffd166;
    }

    .card {
      overflow: hidden;
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .image-wrap {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: #f8f3ea;
      aspect-ratio: 16 / 10;
      max-height: 45dvh;
      min-height: 230px;
    }

    .scene-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sentence-panel {
      text-align: center;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .sentence {
      margin: 0;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.15;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
    }

    .sentence-tip {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    .playback-row {
      min-height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .icon-button {
      width: 68px;
      height: 68px;
      border-radius: 999px;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: linear-gradient(180deg, #ffc63a, var(--orange-deep));
      box-shadow: 0 14px 22px rgba(243, 154, 0, 0.26);
      color: #fff;
    }

    .icon-button.small {
      width: 48px;
      height: 48px;
      box-shadow: 0 10px 18px rgba(243, 154, 0, 0.18);
    }

    .icon-button.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .icon {
      width: 30px;
      height: 30px;
      fill: currentColor;
    }

    .footer-panel {
      padding: 12px 14px;
      display: grid;
      gap: 12px;
    }

    .footer-actions {
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      gap: 14px;
    }

    .nav-button {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      border: none;
      background: #fff3da;
      box-shadow: 0 8px 18px rgba(81, 95, 135, 0.1);
      cursor: pointer;
      color: var(--orange-deep);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-button .icon {
      width: 24px;
      height: 24px;
    }

    .status {
      min-height: 22px;
      text-align: center;
      color: #5d6778;
      font-size: 14px;
      line-height: 1.5;
    }

    .footer-links {
      display: flex;
      justify-content: center;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 16px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 800;
      background: #fff7e6;
      border: 2px solid #ffe2af;
    }

    .hidden-audio {
      display: none;
    }

    @media (max-width: 640px) {
      .app {
        width: calc(100vw - 12px);
        padding: 8px 0 12px;
        gap: 10px;
      }

      .topbar,
      .card,
      .footer-panel {
        border-radius: 20px;
      }

      .topbar {
        padding: 10px 12px;
      }

      .progress-text {
        font-size: 16px;
      }

      .dot {
        width: 32px;
        height: 32px;
      }

      .card {
        padding: 10px;
      }

      .image-wrap {
        min-height: 200px;
        max-height: 39dvh;
      }

      .sentence {
        font-size: clamp(24px, 8vw, 36px);
      }

      .sentence-tip {
        font-size: 13px;
      }

      .footer-panel {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="topline">
        <div class="progress-text" id="progressText">1/22</div>
      </div>
      <div class="dots" id="dots"></div>
    </section>

    <section class="card">
      <div class="image-wrap">
        <img id="sceneImage" class="scene-image" alt="scene" />
      </div>

      <div class="sentence-panel">
        <h1 id="sentence" class="sentence" role="button" tabindex="0">Hello, everyone!</h1>
        <p class="sentence-tip">点击英文整句朗读</p>
        <div class="playback-row">
          <button id="playRecordBtn" class="icon-button small hidden" type="button" aria-label="播放录音">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10v4h4l5 4V6L7 10H3zm12.5 2A4.5 4.5 0 0 0 13 7.97v8.06A4.5 4.5 0 0 0 15.5 12zm0-9.5v2.06A7.5 7.5 0 0 1 15.5 19.44v2.06A9.5 9.5 0 0 0 15.5 2.5z"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <section class="footer-panel">
      <div class="footer-actions">
        <button id="prevBtn" class="nav-button" type="button" aria-label="上一句">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.4 5.4 9 12l6.4 6.6L14 20 6 12l8-8z" fill="currentColor"/>
          </svg>
        </button>

        <div style="display:flex; justify-content:center;">
          <button id="recordBtn" class="icon-button" type="button" aria-label="开始录音">
            <svg id="recordIcon" class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.07A7 7 0 0 1 5 12a1 1 0 1 1 2 0 5 5 0 0 0 10 0z"/>
            </svg>
          </button>
        </div>

        <button id="nextBtn" class="nav-button" type="button" aria-label="下一句">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m8.6 18.6 6.4-6.6-6.4-6.6L10 4l8 8-8 8z" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <div id="statusText" class="status">点英文整句朗读，点话筒开始录音。</div>

      <div class="footer-links">
        <a id="statsLink" class="link-button" href="./stats.html">查看统计</a>
      </div>
    </section>

    <audio id="playback" class="hidden-audio" controls playsinline></audio>
  </main>

  <script>
    const APP_CONFIG = {
      assetVersion: "20260402-1",
      title: "Suya's Happy English",
      storyLines: [
        { text: "Hello, everyone!", image: "images/hello.jpg" },
        { text: "My name is suya.", image: "images/name.jpg" },
        { text: "I am four years old.", image: "images/four.jpg" },
        { text: "If I have a superpower,", image: "images/superpower.jpg" },
        { text: "I want to fly.", image: "images/fly.png" },
        { text: "I can fly with my big bear.", image: "images/big-bear.jpg" },
        { text: "I can fly over my school.", image: "images/school.jpg" },
        { text: "I can fly up to the sky.", image: "images/sky.jpg" },
        { text: "I can play with little birds.", image: "images/birds.jpg" },
        { text: "I can draw a rainbow in the sky.", image: "images/draw-rainbow.jpg" },
        { text: "I can slide on the rainbow.", image: "images/rainbow.jpg" },
        { text: "I can fly higher and higher.", image: "images/higher.jpg" },
        { text: "Then I will pick little stars.", image: "images/stars.jpg" },
        { text: "I will touch soft white clouds.", image: "images/clouds.jpg" },
        { text: "I will sit on the moon", image: "images/moon.jpg" },
        { text: "and sleep in the moonlight.", image: "images/moonlight.jpg" },
        { text: "I will laugh and laugh.", image: "images/laugh.jpg" },
        { text: "It will be so much fun.", image: "images/fun.jpg" },
        { text: "If I have a superpower,", image: "images/superpower-2.jpg" },
        { text: "I want to fly.", image: "images/fly.png" },
        { text: "Flying is fun.", image: "images/flying-fun.jpg" },
        { text: "Flying is magic.", image: "images/magic.jpg" },
        { text: "Thank you!", image: "images/thankyou.jpg" }
      ]
    };

    const DB_NAME = "suya-english-game";
    const DB_VERSION = 1;
    const STORE_NAME = "kv";
    const STORAGE_KEY = "suya-english-game-state";

    function withVersion(url) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}v=${APP_CONFIG.assetVersion}`;
    }

    const storyLines = APP_CONFIG.storyLines.map((item) => ({
      ...item,
      image: withVersion(item.image)
    }));

    let db = null;
    let currentIndex = 0;
    let preferredVoice = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let audioUrl = "";
    let activeStream = null;
    let isRecording = false;
    let recognition = null;
    let transcriptResult = "";
    let progressState = {
      totalStars: 0,
      bestScore: 0,
      currentIndex: 0,
      dailyStars: {}
    };

    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const progressText = document.getElementById("progressText");
    const dots = document.getElementById("dots");
    const sceneImage = document.getElementById("sceneImage");
    const sentence = document.getElementById("sentence");
    const playRecordBtn = document.getElementById("playRecordBtn");
    const playback = document.getElementById("playback");
    const recordBtn = document.getElementById("recordBtn");
    const recordIcon = document.getElementById("recordIcon");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const statusText = document.getElementById("statusText");
    const statsLink = document.getElementById("statsLink");

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}${month}${day}`;
    }

    function normalizeSpeechText(text, singleWord = false) {
      const trimmed = text.trim();
      if (singleWord && /^i$/i.test(trimmed)) {
        return "eye";
      }

      return trimmed
        .replace(/\bsuya\b/gi, "Suya")
        .replace(/\bI\b/g, "eye");
    }

    function getEnglishVoice() {
      const voices = window.speechSynthesis.getVoices();
      return (
        voices.find((voice) => voice.lang.toLowerCase().startsWith("en") && /samantha|zira|aria|ava|allison|female/i.test(voice.name)) ||
        voices.find((voice) => voice.lang.toLowerCase().startsWith("en")) ||
        null
      );
    }

    function initVoices() {
      if (!("speechSynthesis" in window)) return;
      preferredVoice = getEnglishVoice();
    }

    function speak(text, singleWord = false, rate = 0.92, usePreferredVoice = true) {
      if (!("speechSynthesis" in window)) {
        statusText.textContent = "当前浏览器不支持朗读。";
        return;
      }

      const utterance = new SpeechSynthesisUtterance(normalizeSpeechText(text, singleWord));
      utterance.lang = "en-US";
      utterance.rate = rate;
      utterance.pitch = isSafari ? 1 : 1.04;
      utterance.volume = 1;

      if (usePreferredVoice && preferredVoice) {
        utterance.voice = preferredVoice;
      }

      utterance.onstart = () => {
        statusText.textContent = "正在朗读这一句。";
      };

      utterance.onend = () => {
        statusText.textContent = "可以点话筒录音了。";
      };

      utterance.onerror = () => {
        if (usePreferredVoice && preferredVoice) {
          preferredVoice = null;
          setTimeout(() => speak(text, singleWord, rate, false), 120);
          return;
        }
        statusText.textContent = "朗读失败，请再点一次。";
      };

      try {
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      } catch (error) {
        statusText.textContent = "朗读失败，请再点一次。";
      }
    }

    function formatRecordIcon(recording) {
      recordIcon.innerHTML = recording
        ? '<path d="M7 7h4v10H7zm6 0h4v10h-4z"/>'
        : '<path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.07A7 7 0 0 1 5 12a1 1 0 1 1 2 0 5 5 0 0 0 10 0z"/>';
    }

    function renderDots() {
      dots.innerHTML = "";
      storyLines.forEach((_, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `dot${index === currentIndex ? " active" : ""}`;
        button.textContent = index + 1;
        button.addEventListener("click", async () => {
          currentIndex = index;
          renderCurrentLine();
          await saveProgress();
        });
        dots.append(button);
      });
    }

    function renderCurrentLine() {
      const current = storyLines[currentIndex];
      document.title = APP_CONFIG.title;
      progressText.textContent = `${currentIndex + 1}/${storyLines.length}`;
      sceneImage.src = current.image;
      sceneImage.alt = current.text;
      sentence.textContent = current.text;
      statsLink.href = withVersion("./stats.html");
      renderDots();
    }

    function openDb() {
      return new Promise((resolve, reject) => {
        if (!("indexedDB" in window)) {
          resolve(null);
          return;
        }
        const request = window.indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function dbGet(key) {
      return new Promise((resolve, reject) => {
        if (!db) {
          resolve(null);
          return;
        }
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(key);
        request.onsuccess = () => resolve(request.result ?? null);
        request.onerror = () => reject(request.error);
      });
    }

    function dbSet(key, value) {
      return new Promise((resolve, reject) => {
        if (!db) {
          resolve();
          return;
        }
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        store.put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function loadLocalFallback() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function saveLocalFallback(state) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
      }
    }

    async function loadProgress() {
      let state = null;
      try {
        db = await openDb();
        state = await dbGet("progress");
      } catch (error) {
        db = null;
      }

      if (!state) {
        state = loadLocalFallback();
      }

      const dailyStars = state && state.dailyStars && typeof state.dailyStars === "object" ? state.dailyStars : {};
      const totalStars = state && Number.isFinite(state.totalStars)
        ? state.totalStars
        : state && Number.isFinite(state.stars)
          ? state.stars
          : 0;
      const bestScore = state && Number.isFinite(state.bestScore) ? state.bestScore : 0;
      const savedIndex = state && Number.isFinite(state.currentIndex) ? state.currentIndex : 0;

      progressState = {
        totalStars,
        bestScore,
        currentIndex: Math.max(0, Math.min(storyLines.length - 1, savedIndex)),
        dailyStars
      };

      currentIndex = progressState.currentIndex;
    }

    async function saveProgress() {
      progressState.currentIndex = currentIndex;
      const state = {
        stars: progressState.totalStars,
        totalStars: progressState.totalStars,
        bestScore: progressState.bestScore,
        currentIndex: progressState.currentIndex,
        dailyStars: progressState.dailyStars,
        savedAt: Date.now()
      };

      saveLocalFallback(state);
      try {
        if (!db) {
          db = await openDb();
        }
        if (db) {
          await dbSet("progress", state);
        }
      } catch (error) {
      }
    }

    function scoreSpeech(target, spoken) {
      const normalizeWords = (text) => text
        .toLowerCase()
        .replace(/[^a-z\s'-]/g, " ")
        .split(/\s+/)
        .filter(Boolean);

      const targetWords = normalizeWords(target);
      const spokenWords = normalizeWords(spoken);
      if (!targetWords.length) return 0;

      const remaining = [...spokenWords];
      let matched = 0;
      targetWords.forEach((word) => {
        const foundIndex = remaining.indexOf(word);
        if (foundIndex >= 0) {
          matched += 1;
          remaining.splice(foundIndex, 1);
        }
      });

      return Math.round((matched / targetWords.length) * 100);
    }

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return null;
      const recognizer = new SpeechRecognition();
      recognizer.lang = "en-US";
      recognizer.interimResults = false;
      recognizer.maxAlternatives = 1;
      recognizer.continuous = false;
      recognizer.onresult = (event) => {
        transcriptResult = Array.from(event.results)
          .map((result) => result[0].transcript)
          .join(" ")
          .trim();
      };
      return recognizer;
    }

    function getRecorderOptions() {
      if (typeof MediaRecorder === "undefined") return null;
      const candidates = ["audio/mp4", "audio/webm;codecs=opus", "audio/webm", "audio/ogg;codecs=opus"];
      for (const mimeType of candidates) {
        if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(mimeType)) {
          return { mimeType };
        }
      }
      return {};
    }

    function stopActiveStream() {
      if (activeStream) {
        activeStream.getTracks().forEach((track) => track.stop());
        activeStream = null;
      }
    }

    async function awardStar() {
      progressState.totalStars += 1;
      const todayKey = getTodayKey();
      progressState.dailyStars[todayKey] = (Number(progressState.dailyStars[todayKey]) || 0) + 1;
      await saveProgress();
    }

    async function startRecording() {
      if (isRecording) {
        stopRecording();
        return;
      }

      if (!window.isSecureContext) {
        statusText.textContent = "录音需要通过 GitHub Pages、localhost 或 https 打开。";
        return;
      }

      if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || typeof MediaRecorder === "undefined") {
        statusText.textContent = "当前浏览器不支持录音。";
        return;
      }

      transcriptResult = "";
      recognition = initRecognition();

      try {
        activeStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        audioChunks = [];
        const recorderOptions = getRecorderOptions();
        mediaRecorder = recorderOptions ? new MediaRecorder(activeStream, recorderOptions) : new MediaRecorder(activeStream);
        isRecording = true;
        formatRecordIcon(true);
        statusText.textContent = "正在录音，再点一次话筒结束。";

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          const blobType = audioChunks[0] ? audioChunks[0].type : "audio/mp4";
          const blob = new Blob(audioChunks, { type: blobType });
          if (audioUrl) URL.revokeObjectURL(audioUrl);
          audioUrl = URL.createObjectURL(blob);
          playback.src = audioUrl;
          playRecordBtn.classList.remove("hidden");

          if (transcriptResult) {
            progressState.bestScore = Math.max(progressState.bestScore, scoreSpeech(storyLines[currentIndex].text, transcriptResult));
          }

          await awardStar();
          stopActiveStream();
          statusText.textContent = "录音完成，英文下方可以播放你的录音。";
        };

        mediaRecorder.onerror = () => {
          statusText.textContent = "录音失败，请再试一次。";
          stopActiveStream();
        };

        mediaRecorder.start();

        if (recognition) {
          try {
            recognition.start();
          } catch (error) {
          }
        }
      } catch (error) {
        stopActiveStream();
        isRecording = false;
        formatRecordIcon(false);
        statusText.textContent = "无法打开麦克风，请检查 iPhone 浏览器权限。";
      }
    }

    function stopRecording() {
      if (!isRecording) return;
      isRecording = false;
      formatRecordIcon(false);

      if (recognition) {
        try {
          recognition.stop();
        } catch (error) {
        }
      }

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      } else {
        stopActiveStream();
      }
    }

    function changeLine(step) {
      currentIndex = (currentIndex + step + storyLines.length) % storyLines.length;
      playRecordBtn.classList.add("hidden");
      playback.removeAttribute("src");
      renderCurrentLine();
      saveProgress();
      statusText.textContent = "点英文整句朗读，点话筒开始录音。";
    }

    sentence.addEventListener("click", () => speak(storyLines[currentIndex].text));
    sentence.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        speak(storyLines[currentIndex].text);
      }
    });

    playRecordBtn.addEventListener("click", async () => {
      try {
        await playback.play();
      } catch (error) {
        statusText.textContent = "播放录音失败，请再点一次。";
      }
    });

    recordBtn.addEventListener("click", startRecording);
    prevBtn.addEventListener("click", () => changeLine(-1));
    nextBtn.addEventListener("click", () => changeLine(1));

    async function initApp() {
      if ("speechSynthesis" in window) {
        initVoices();
        window.speechSynthesis.onvoiceschanged = initVoices;
        setTimeout(initVoices, 300);
      }

      await loadProgress();
      renderCurrentLine();
      formatRecordIcon(false);
    }

    initApp();
  </script>
</body>
</html>
