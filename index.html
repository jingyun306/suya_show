<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suya's English Game</title>
  <style>
    :root {
      --sky: #eaf8ff;
      --peach: #fff0d9;
      --panel: #ffffff;
      --ink: #304057;
      --pink: #ff8fb1;
      --orange: #ff9b54;
      --yellow: #ffd65a;
      --green: #70c98b;
      --blue: #79c8ff;
      --line: #ffd7b2;
      --shadow: 0 18px 36px rgba(81, 95, 135, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 214, 90, 0.5) 0, transparent 18%),
        radial-gradient(circle at 85% 12%, rgba(121, 200, 255, 0.45) 0, transparent 20%),
        radial-gradient(circle at 10% 90%, rgba(255, 143, 177, 0.35) 0, transparent 18%),
        linear-gradient(180deg, var(--sky) 0%, #fff9ef 62%, #fff2df 100%);
      min-height: 100vh;
    }

    .app {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 10px 18px;
      border-radius: 18px;
      background: #fff;
      border: 2px solid #ffe3b1;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(255, 155, 84, 0.12);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border-radius: 28px;
      padding: 18px;
      box-shadow: var(--shadow);
      border: 3px solid #fff;
    }

    .stage {
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .progress {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .sticker {
      min-height: 52px;
      padding: 10px 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fff6db, #ffe8a8);
      border: 2px solid #fff;
      box-shadow: 0 10px 20px rgba(255, 193, 68, 0.22);
      font-size: 18px;
      font-weight: 800;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .big-button {
      min-height: 58px;
      padding: 14px 20px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 800;
      color: var(--ink);
      transition: transform 0.14s ease, filter 0.14s ease;
      box-shadow: 0 10px 18px rgba(74, 84, 122, 0.12);
    }

    .big-button:hover,
    .big-button:focus-visible {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.03);
      outline: none;
    }

    .big-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-orange { background: linear-gradient(180deg, #ffb377, var(--orange)); color: #fff; }
    .btn-pink { background: linear-gradient(180deg, #ffb8ce, var(--pink)); color: #fff; }
    .btn-blue { background: linear-gradient(180deg, #a6ddff, var(--blue)); }
    .btn-green { background: linear-gradient(180deg, #a6e4b8, var(--green)); color: #fff; }
    .btn-yellow { background: linear-gradient(180deg, #ffe89b, var(--yellow)); }

    .card {
      overflow: hidden;
      border-radius: 28px;
      border: 3px dashed var(--line);
      background: linear-gradient(180deg, #fffdf8, #fff6ea);
      padding: 16px;
    }

    .illustration {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      border-radius: 24px;
      border: 3px solid #fff;
      background: linear-gradient(135deg, #ffe4d7, #fff2be);
    }

    .sentence-box {
      margin-top: 14px;
      padding: 16px;
      border-radius: 24px;
      background: #fff;
      border: 2px solid #ffe3c9;
    }

    .sentence-box h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .sentence {
      font-size: clamp(28px, 3.4vw, 40px);
      line-height: 1.35;
      font-weight: 900;
      cursor: pointer;
    }

    .token {
      display: inline-block;
      margin: 0 8px 10px 0;
      padding: 10px 14px;
      border-radius: 18px;
      background: #fff6d8;
      border: 2px solid transparent;
      user-select: none;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.14s ease;
    }

    .token:hover,
    .token:focus-visible {
      transform: translateY(-2px);
      background: #ffe9aa;
      border-color: #ffd26f;
      outline: none;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .record-box {
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, #fff3f6, #fff9fc);
      border: 2px solid #ffd4df;
      display: grid;
      gap: 12px;
    }

    .record-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .status {
      min-height: 56px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #eef9ff;
      border: 2px solid #d7efff;
      font-size: 16px;
      line-height: 1.5;
      font-weight: 700;
    }

    .score-card {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f7fff1;
      border: 2px solid #d7efc8;
    }

    .score-number {
      font-size: 34px;
      font-weight: 900;
      color: #44a968;
    }

    .tips {
      font-size: 14px;
      color: #66758a;
      line-height: 1.6;
    }

    .line-list {
      display: grid;
      gap: 10px;
      max-height: 660px;
      overflow: auto;
      padding-right: 4px;
    }

    .line-item {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 20px;
      background: #fff8ec;
      border: 2px solid transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      color: var(--ink);
    }

    .line-item.active {
      background: #fff0cf;
      border-color: #ffca77;
    }

    .line-item strong {
      display: block;
      font-size: 17px;
      margin-bottom: 6px;
    }

    .line-item span {
      font-size: 13px;
      color: #6f7287;
      font-weight: 600;
    }

    .compat-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #fff8ec;
      border: 2px solid #ffe2b8;
      font-size: 14px;
      line-height: 1.6;
    }

    audio {
      width: 100%;
      height: 44px;
    }

    .footer-actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .control-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
  <body>
  <main class="app">
    <section class="layout">
      <div class="panel stage">
        <div class="topbar">
          <div class="progress">
            <div class="sticker" id="lineLabel">Hello, everyone!</div>
          </div>
          <div class="nav">
            <button id="prevBtn" class="big-button btn-yellow" type="button">上一句</button>
            <button id="nextBtn" class="big-button btn-yellow" type="button">下一句</button>
            <button id="randomBtn" class="big-button btn-blue" type="button">随机一句</button>
          </div>
        </div>

        <div class="card">
          <img id="sceneImage" class="illustration" alt="scene" />
          <div class="sentence-box">
            <h2>点句子整句朗读</h2>
            <div id="sentence" class="sentence" role="button" tabindex="0"></div>
          </div>
        </div>

        <div class="control-grid">
          <button id="speakSentenceBtn" class="big-button btn-orange" type="button">朗读整句</button>
          <button id="speakSlowBtn" class="big-button btn-pink" type="button">慢慢读</button>
          <button id="speakWordsBtn" class="big-button btn-blue" type="button">逐词读</button>
          <button id="markDoneBtn" class="big-button btn-green" type="button">我会了 +1 星</button>
        </div>

        <div class="record-box">
          <div class="record-actions">
            <button id="recordBtn" class="big-button btn-orange" type="button">开始录音跟读</button>
            <button id="stopBtn" class="big-button btn-pink" type="button" disabled>停止录音</button>
            <button id="playRecordBtn" class="big-button btn-blue" type="button" disabled>播放我的录音</button>
          </div>
          <audio id="playback" controls playsinline></audio>
          <div id="statusText" class="status">准备好了，先点“朗读整句”，再点“开始录音跟读”。</div>
          <div class="score-card">
            <div class="score-number" id="scoreNumber">0 分</div>
            <div id="scoreHint">跟读后会显示评分和鼓励提示。</div>
            <div id="recognizedText" class="tips">识别结果会显示在这里。如果浏览器不支持语音识别，也可以录音回放。</div>
          </div>
        </div>
      </div>

      <aside class="panel">
        <h2>句子选择</h2>
        <div id="lineList" class="line-list"></div>
        <div class="compat-box" id="compatBox">
          Safari 提示会显示在这里。
        </div>
        <div class="tips" style="margin-top: 14px;">
          内容替换：只需要修改页面脚本顶部的 <code>APP_CONFIG</code>。每句的 <code>text</code> 是句子，<code>image</code> 是图片路径。<br />
          Safari 下如果录音无法启动，请不要直接双击本地文件，改用本地服务器方式打开。
        </div>
      </aside>
    </section>

    <div class="footer-actions">
      <a class="link-button" id="statsLink" href="./stats.html">查看统计</a>
    </div>
  </main>

  <script>
    const APP_CONFIG = {
      assetVersion: "20260331-1",
      title: "Suya's Happy English",
      subtitle: "点句子听老师读，点单词学发音，再按录音按钮跟读。这个版本额外做了 Safari 兼容处理。",
      storyLines: [
        { text: "Hello, everyone!", image: "images/hello.jpg" },
        { text: "My name is suya.", image: "images/name.jpg" },
        { text: "I am four years old.", image: "images/four.jpg" },
        { text: "If I have a superpower,", image: "images/superpower.jpg" },
        { text: "I want to fly.", image: "images/fly.jpg" },
        { text: "I can fly over my home.", image: "images/home.jpg" },
        { text: "I can fly over my school.", image: "images/school.jpg" },
        { text: "I can fly over the park.", image: "images/park.jpg" },
        { text: "I can fly with little birds.", image: "images/birds.jpg" },
        { text: "I can slide on the rainbow.", image: "images/rainbow.jpg" },
        { text: "I can fly high, high, high.", image: "images/high.jpg" },
        { text: "Then I will pick little stars.", image: "images/stars.jpg" },
        { text: "I will touch white clouds.", image: "images/clouds.jpg" },
        { text: "I will sit on the moon", image: "images/moon.jpg" },
        { text: "and sleep in the moonlight.", image: "images/moonlight.jpg" },
        { text: "I will laugh and laugh.", image: "images/laugh.jpg" },
        { text: "It will be so much fun.", image: "images/fun.jpg" },
        { text: "If I have a superpower,", image: "images/superpower-2.jpg" },
        { text: "I want to fly.", image: "images/fly-2.jpg" },
        { text: "Flying is fun.", image: "images/flying-fun.jpg" },
        { text: "Flying is magic.", image: "images/magic.jpg" },
        { text: "Thank you!", image: "images/thankyou.jpg" }
      ]
    };

    function withVersion(url) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}v=${APP_CONFIG.assetVersion}`;
    }

    const storyLines = APP_CONFIG.storyLines.map((item) => ({
      ...item,
      image: withVersion(item.image)
    }));

    const DB_NAME = "suya-english-game";
    const DB_VERSION = 1;
    const STORE_NAME = "kv";
    const STORAGE_KEY = "suya-english-game-state";

    let currentIndex = 0;
    let stars = 0;
    let bestScore = 0;
    let preferredVoice = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let audioUrl = "";
    let recognition = null;
    let transcriptResult = "";
    let isRecording = false;
    let activeStream = null;
    let db = null;

    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    const lineLabel = document.getElementById("lineLabel");
    const sceneImage = document.getElementById("sceneImage");
    const sentence = document.getElementById("sentence");
    const statusText = document.getElementById("statusText");
    const lineList = document.getElementById("lineList");
    const scoreNumber = document.getElementById("scoreNumber");
    const scoreHint = document.getElementById("scoreHint");
    const recognizedText = document.getElementById("recognizedText");
    const playback = document.getElementById("playback");
    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const playRecordBtn = document.getElementById("playRecordBtn");
    const compatBox = document.getElementById("compatBox");
    const statsLink = document.getElementById("statsLink");

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}${month}${day}`;
    }

    function renderHeader() {
      document.title = APP_CONFIG.title;
      statsLink.href = withVersion("./stats.html");
    }

    function openDb() {
      return new Promise((resolve, reject) => {
        if (!("indexedDB" in window)) {
          resolve(null);
          return;
        }

        const request = window.indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function dbGet(key) {
      return new Promise((resolve, reject) => {
        if (!db) {
          resolve(null);
          return;
        }
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(key);
        request.onsuccess = () => resolve(request.result ?? null);
        request.onerror = () => reject(request.error);
      });
    }

    function dbSet(key, value) {
      return new Promise((resolve, reject) => {
        if (!db) {
          resolve();
          return;
        }
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        store.put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function loadLocalFallback() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function saveLocalFallback(state) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
      }
    }

    async function loadProgress() {
      let state = null;

      try {
        db = await openDb();
        state = await dbGet("progress");
      } catch (error) {
        db = null;
      }

      if (!state) {
        state = loadLocalFallback();
      }

      if (state) {
        const dailyStars = state.dailyStars && typeof state.dailyStars === "object" ? state.dailyStars : {};
        const migratedTotalStars = Number.isFinite(state.totalStars)
          ? state.totalStars
          : Number.isFinite(state.stars)
            ? state.stars
            : 0;
        stars = migratedTotalStars;
        bestScore = Number.isFinite(state.bestScore) ? state.bestScore : 0;
        currentIndex = Number.isFinite(state.currentIndex) ? Math.max(0, Math.min(storyLines.length - 1, state.currentIndex)) : 0;
        state.dailyStars = dailyStars;
      }
    }

    async function saveProgress() {
      let existingState = null;

      try {
        existingState = db ? await dbGet("progress") : loadLocalFallback();
      } catch (error) {
        existingState = loadLocalFallback();
      }

      const dailyStars = existingState && existingState.dailyStars && typeof existingState.dailyStars === "object"
        ? existingState.dailyStars
        : {};

      const state = {
        stars,
        totalStars: stars,
        bestScore,
        currentIndex,
        dailyStars,
        savedAt: Date.now()
      };
      saveLocalFallback(state);

      try {
        if (!db) {
          db = await openDb();
        }
        if (db) {
          await dbSet("progress", state);
        }
      } catch (error) {
      }
    }

    function updateCompatibilityTip() {
      const tips = [];

      if (isSafari) {
        tips.push("Safari 已启用兼容模式。建议先点一次页面按钮，再使用朗读和录音。");
      }

      if (!window.isSecureContext) {
        tips.push("当前不是安全上下文。Safari 的麦克风通常需要用 localhost 或 https 打开页面。直接打开本地文件时，录音可能失败。");
      }

      if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) {
        tips.push("当前浏览器没有可用的语音识别评分接口，仍然可以录音和回放。Safari 某些版本会出现这个情况。");
      }

      if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
        tips.push("当前浏览器不支持麦克风录音接口。请换较新的 Safari、Edge 或 Chrome。");
      }

      tips.push("学习记录会保存在当前浏览器里，刷新页面后星星和最高分会保留。详细统计在统计页查看。");

      compatBox.textContent = tips.join(" ");
    }

    function getEnglishVoice() {
      const voices = window.speechSynthesis.getVoices();
      return (
        voices.find((voice) => voice.lang.toLowerCase().startsWith("en") && /female|samantha|zira|aria|google us english|ava|allison/i.test(voice.name)) ||
        voices.find((voice) => voice.lang.toLowerCase().startsWith("en")) ||
        null
      );
    }

    function initVoices() {
      if (!("speechSynthesis" in window)) return;
      preferredVoice = getEnglishVoice();
    }

    function speak(text, rate = 0.95, usePreferredVoice = true) {
      if (!("speechSynthesis" in window)) {
        statusText.textContent = "这个浏览器不支持朗读，建议用新版 Safari、Edge 或 Chrome。";
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text.trim());
      utterance.lang = "en-US";
      utterance.rate = rate;
      utterance.pitch = isSafari ? 1 : 1.05;
      utterance.volume = 1;
      if (usePreferredVoice && preferredVoice) utterance.voice = preferredVoice;

      utterance.onstart = () => {
        statusText.textContent = `老师在读: ${text}`;
      };

      utterance.onend = () => {
        statusText.textContent = "朗读完成，现在可以跟读啦。";
      };

      utterance.onerror = (event) => {
        if (usePreferredVoice && preferredVoice) {
          preferredVoice = null;
          statusText.textContent = "正在切换默认语音重试。";
          setTimeout(() => speak(text, rate, false), 120);
          return;
        }
        statusText.textContent = `朗读失败: ${event.error || "unknown"}`;
      };

      try {
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      } catch (error) {
        statusText.textContent = `朗读失败: ${error.message}`;
      }
    }

    function normalizeWords(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z\s'-]/g, " ")
        .split(/\s+/)
        .filter(Boolean);
    }

    function scoreSpeech(target, spoken) {
      const targetWords = normalizeWords(target);
      const spokenWords = normalizeWords(spoken);
      if (!targetWords.length) return { score: 0, matched: 0, total: 0 };

      const remaining = [...spokenWords];
      let matched = 0;

      targetWords.forEach((word) => {
        const index = remaining.indexOf(word);
        if (index >= 0) {
          matched += 1;
          remaining.splice(index, 1);
        }
      });

      const ratio = matched / targetWords.length;
      const score = Math.max(0, Math.min(100, Math.round(ratio * 100)));
      return { score, matched, total: targetWords.length };
    }

    function scoreMessage(score) {
      if (score >= 95) return "太棒了，几乎全对。";
      if (score >= 80) return "很好，已经读得很清楚了。";
      if (score >= 60) return "不错，再慢一点会更好。";
      if (score >= 35) return "有进步，先听一遍再跟读一次。";
      return "先跟着老师一句一句读，别着急。";
    }

    async function updateScore(score, transcript, matchedInfo) {
      bestScore = Math.max(bestScore, score);
      scoreNumber.textContent = `${score} 分`;
      scoreHint.textContent = `${scoreMessage(score)} 匹配 ${matchedInfo.matched}/${matchedInfo.total} 个单词。`;
      recognizedText.textContent = transcript
        ? `识别到: ${transcript}`
        : "这次没有识别到清晰语音，可以再试一次。";
      renderHeader();
      await saveProgress();
    }

    function buildTokens(text) {
      sentence.innerHTML = "";
      const parts = text.split(/(\s+)/);
      parts.forEach((part) => {
        if (!part.trim()) {
          sentence.append(document.createTextNode(part));
          return;
        }
        const token = document.createElement("span");
        token.className = "token";
        token.textContent = part;
        token.tabIndex = 0;
        token.addEventListener("click", (event) => {
          event.stopPropagation();
          speak(part.replace(/[.,!?]/g, ""), 0.84);
        });
        token.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            speak(part.replace(/[.,!?]/g, ""), 0.84);
          }
        });
        sentence.append(token);
      });
    }

    function renderLineList() {
      lineList.innerHTML = "";
      storyLines.forEach((item, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `line-item${index === currentIndex ? " active" : ""}`;
        button.innerHTML = `<strong>${index + 1}. ${item.text}</strong><span>点这里切换</span>`;
        button.addEventListener("click", async () => {
          currentIndex = index;
          renderCurrentLine();
          await saveProgress();
        });
        lineList.append(button);
      });
    }

    function resetPracticePanel() {
      scoreNumber.textContent = "0 分";
      scoreHint.textContent = "跟读后会显示评分和鼓励提示。";
      recognizedText.textContent = "识别结果会显示在这里。如果浏览器不支持语音识别，也可以录音回放。";
      statusText.textContent = "准备好了，先点“朗读整句”，再点“开始录音跟读”。";
    }

    function renderCurrentLine() {
      const current = storyLines[currentIndex];
      renderHeader();
      lineLabel.textContent = current.text;
      sceneImage.src = current.image;
      sceneImage.alt = current.text;
      sceneImage.onerror = () => {
        sceneImage.src =
          "data:image/svg+xml;charset=UTF-8," +
          encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 560'><rect width='900' height='560' fill='#ffe7d3'/><text x='50%' y='48%' dominant-baseline='middle' text-anchor='middle' font-size='36' font-family='Arial' fill='#8d5a44'>Replace this image</text></svg>");
      };
      buildTokens(current.text);
      renderLineList();
      resetPracticePanel();
    }

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return null;
      const recognizer = new SpeechRecognition();
      recognizer.lang = "en-US";
      recognizer.interimResults = false;
      recognizer.maxAlternatives = 1;
      recognizer.continuous = false;

      recognizer.onresult = (event) => {
        transcriptResult = Array.from(event.results)
          .map((result) => result[0].transcript)
          .join(" ")
          .trim();
      };

      recognizer.onerror = (event) => {
        if (event.error !== "aborted") {
          recognizedText.textContent = `语音识别提示: ${event.error}`;
        }
      };

      return recognizer;
    }

    function getRecorderOptions() {
      if (typeof MediaRecorder === "undefined") return null;
      const candidates = [
        "audio/mp4",
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/ogg;codecs=opus"
      ];

      for (const mimeType of candidates) {
        if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(mimeType)) {
          return { mimeType };
        }
      }

      return {};
    }

    function stopActiveStream() {
      if (activeStream) {
        activeStream.getTracks().forEach((track) => track.stop());
        activeStream = null;
      }
    }

    async function startRecording() {
      if (isRecording) return;

      if (!window.isSecureContext) {
        statusText.textContent = "Safari 录音通常要求用 localhost 或 https 打开页面。请不要直接双击 html 文件。";
        return;
      }

      if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
        statusText.textContent = "当前浏览器不支持麦克风录音。";
        return;
      }

      if (typeof MediaRecorder === "undefined") {
        statusText.textContent = "当前浏览器不支持 MediaRecorder，无法录音。";
        return;
      }

      transcriptResult = "";
      recognition = initRecognition();

      try {
        activeStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        audioChunks = [];
        const recorderOptions = getRecorderOptions();
        mediaRecorder = recorderOptions ? new MediaRecorder(activeStream, recorderOptions) : new MediaRecorder(activeStream);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          const blobType = audioChunks[0] ? audioChunks[0].type : "audio/mp4";
          const blob = new Blob(audioChunks, { type: blobType });
          if (audioUrl) URL.revokeObjectURL(audioUrl);
          audioUrl = URL.createObjectURL(blob);
          playback.src = audioUrl;
          playRecordBtn.disabled = false;
          stopActiveStream();

          const target = storyLines[currentIndex].text;
          const result = scoreSpeech(target, transcriptResult);
          await updateScore(result.score, transcriptResult, result);
          statusText.textContent = "录音结束，可以播放自己的声音，也可以再来一次。";
        };

        mediaRecorder.onerror = () => {
          statusText.textContent = "录音过程中出现错误，请再试一次。";
          stopActiveStream();
        };

        mediaRecorder.start();
        isRecording = true;
        recordBtn.disabled = true;
        stopBtn.disabled = false;
        playRecordBtn.disabled = true;
        statusText.textContent = "正在录音，请跟着当前句子读。";
        recognizedText.textContent = recognition
          ? "正在识别，请读得慢一点、清楚一点。"
          : "当前浏览器不支持自动评分识别，但仍然可以录音回放。";

        if (recognition) {
          try {
            recognition.start();
          } catch (error) {
            recognizedText.textContent = "语音识别没有启动成功，但录音仍可使用。";
          }
        }
      } catch (error) {
        stopActiveStream();
        statusText.textContent = "无法打开麦克风，请允许浏览器使用麦克风。";
      }
    }

    function stopRecording() {
      if (!isRecording) return;
      isRecording = false;
      recordBtn.disabled = false;
      stopBtn.disabled = true;

      if (recognition) {
        try {
          recognition.stop();
        } catch (error) {
        }
      }

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      } else {
        stopActiveStream();
      }
    }

    function speakWordsOneByOne() {
      const words = storyLines[currentIndex].text
        .split(/\s+/)
        .map((word) => word.replace(/[.,!?]/g, ""))
        .filter(Boolean);
      statusText.textContent = "开始逐词朗读。";
      words.forEach((word, index) => {
        setTimeout(() => speak(word, 0.78), index * 1300);
      });
    }

    document.getElementById("prevBtn").addEventListener("click", async () => {
      currentIndex = (currentIndex - 1 + storyLines.length) % storyLines.length;
      renderCurrentLine();
      await saveProgress();
    });

    document.getElementById("nextBtn").addEventListener("click", async () => {
      currentIndex = (currentIndex + 1) % storyLines.length;
      renderCurrentLine();
      await saveProgress();
    });

    document.getElementById("randomBtn").addEventListener("click", async () => {
      currentIndex = Math.floor(Math.random() * storyLines.length);
      renderCurrentLine();
      await saveProgress();
    });

    document.getElementById("speakSentenceBtn").addEventListener("click", () => {
      speak(storyLines[currentIndex].text);
    });

    document.getElementById("speakSlowBtn").addEventListener("click", () => {
      speak(storyLines[currentIndex].text, 0.72);
    });

    document.getElementById("speakWordsBtn").addEventListener("click", speakWordsOneByOne);

      document.getElementById("markDoneBtn").addEventListener("click", async () => {
      stars += 1;
      let existingState = null;
      try {
        existingState = db ? await dbGet("progress") : loadLocalFallback();
      } catch (error) {
        existingState = loadLocalFallback();
      }

      const todayKey = getTodayKey();
      const dailyStars = existingState && existingState.dailyStars && typeof existingState.dailyStars === "object"
        ? existingState.dailyStars
        : {};
      dailyStars[todayKey] = (Number(dailyStars[todayKey]) || 0) + 1;

      const state = {
        stars,
        totalStars: stars,
        bestScore,
        currentIndex,
        dailyStars,
        savedAt: Date.now()
      };

      saveLocalFallback(state);
      try {
        if (!db) {
          db = await openDb();
        }
        if (db) {
          await dbSet("progress", state);
        }
      } catch (error) {
      }

      renderHeader();
      statusText.textContent = "获得一颗小星星。";
    });

    sentence.addEventListener("click", () => speak(storyLines[currentIndex].text));
    sentence.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        speak(storyLines[currentIndex].text);
      }
    });

    recordBtn.addEventListener("click", startRecording);
    stopBtn.addEventListener("click", stopRecording);
    playRecordBtn.addEventListener("click", async () => {
      try {
        await playback.play();
      } catch (error) {
        statusText.textContent = "播放录音失败，请再点一次播放按钮。";
      }
    });

    async function initApp() {
      if ("speechSynthesis" in window) {
        initVoices();
        window.speechSynthesis.onvoiceschanged = initVoices;
        setTimeout(initVoices, 300);
        setTimeout(initVoices, 1000);
      } else {
        statusText.textContent = "当前浏览器不支持朗读，建议用新版 Safari、Edge 或 Chrome。";
      }

      await loadProgress();
      updateCompatibilityTip();
      renderCurrentLine();
      statusText.textContent = stars > 0 || bestScore > 0
        ? `欢迎回来，已保存 ${stars} 颗星星，最好分数 ${bestScore}。`
        : "准备好了，先点“朗读整句”，再点“开始录音跟读”。";
    }

    initApp();
  </script>
</body>
</html>
